<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#08090d" />
  <title>Sign in · SuperAgent</title>
  <style>
    :root {
      --bg: #08090d;
      --panel: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.1);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #a16207;          /* Sophisticated dark yellow */
      --accent-hover: #854d0e;
      --accent-text: #fef9c3;
      --danger: #f87171;
      --ok: #34d399;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
    }
    body {
      display: flex; align-items: center; justify-content: center; padding: 24px;
      background: var(--bg);
    }
    .card {
      width: 100%; max-width: 400px;
      background: var(--panel); border: 1px solid var(--border); border-radius: 18px;
      padding: 36px 30px; backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45); animation: rise 0.4s ease both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
    .logo {
      width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
      background: var(--accent); color: var(--accent-text);
      margin-bottom: 18px; font-size: 22px;
    }
    h1 { font-size: 22px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.02em; }
    p.sub { color: var(--muted); font-size: 13px; margin: 0 0 26px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin: 0 0 6px; }
    .field { margin-bottom: 16px; }
    input {
      width: 100%; padding: 11px 13px; background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px;
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(161, 98, 7, 0.18); }
    button {
      width: 100%; padding: 12px; margin-top: 6px;
      background: var(--accent); color: var(--accent-text);
      border: 1px solid rgba(0, 0, 0, 0.15); border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: transform 0.1s, background-color 0.15s;
    }
    button:hover { background: var(--accent-hover); }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { display: none; margin-bottom: 16px; padding: 10px 12px; border-radius: 10px; font-size: 13px; }
    .msg.show { display: block; animation: rise 0.2s ease both; }
    .msg.error { background: rgba(248, 113, 113, 0.12); border: 1px solid rgba(248, 113, 113, 0.3); color: var(--danger); }
    .hint { display: none; color: var(--muted); font-size: 11px; margin: -8px 0 16px; }
    .hint.show { display: block; }
    .foot { margin-top: 22px; text-align: center; color: var(--muted); font-size: 11px; }
  </style>
</head>
<body>
  <form class="card" id="auth-form" autocomplete="on">
    <!-- Single admin account: username is fixed. Included (hidden) so password
         managers and the browser's a11y heuristic associate the password field
         with a username instead of warning about a username-less form. -->
    <input type="text" id="username" name="username" value="admin" autocomplete="username" hidden />
    <div class="logo" role="img" aria-label="SuperAgent">
      <svg width="26" height="26" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="8" fill="#ffffff" opacity="0.16" />
        <path d="M11 22L16 10l5 12" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        <circle cx="16" cy="22.5" r="1.8" fill="#ffffff" />
        <circle cx="21" cy="10" r="1.8" fill="#ffffff" />
      </svg>
    </div>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to your SuperAgent workspace</p>

    <div class="msg error" id="error" role="alert" aria-live="assertive"></div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required autofocus aria-describedby="default-hint" />
    </div>
    <div class="hint" id="default-hint" role="status" aria-live="polite">
      No custom password set yet — the default password is <code>admin</code>.
      Set a new one via <code>superagent password set</code> or the Account page.
    </div>

    <button type="submit" id="submit">Sign in</button>
    <div class="foot">SuperAgent · Secure VPS Access</div>
  </form>

  <script>
    (function () {
      var form = document.getElementById('auth-form');
      var errorBox = document.getElementById('error');
      var submitBtn = document.getElementById('submit');
      var defaultHint = document.getElementById('default-hint');
      var passwordInput = document.getElementById('password');

      function showError(msg) {
        errorBox.textContent = msg;
        errorBox.classList.add('show');
      }

      // Skip to the app if already signed in; otherwise show the default-password
      // hint when no custom password has been configured yet.
      fetch('/api/auth/status', { credentials: 'same-origin' })
        .then(function (r) { return r.json(); })
        .then(function (s) {
          if (!s) return;
          if (s.authenticated) { window.location.replace('/'); return; }
          if (s.authRequired && !s.passwordSet) defaultHint.classList.add('show');
        })
        .catch(function () {});

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        errorBox.classList.remove('show');

        var password = passwordInput.value;
        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in…';

        fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ password: password })
        })
          .then(function (res) {
            // Read the body as text first so a non-JSON error response (e.g. the
            // server's default 500 HTML page) can't throw while parsing JSON and
            // get misreported as a network failure in the catch below.
            return res.text().then(function (text) {
              var data = null;
              try { data = text ? JSON.parse(text) : null; } catch (e) { data = null; }
              return { ok: res.ok, status: res.status, data: data };
            });
          })
          .then(function (result) {
            if (result.ok) {
              window.location.replace('/');
              return;
            }
            // The server answered, so this is NOT a network error. Distinguish a
            // server-side fault (5xx) from a normal auth failure (e.g. 401).
            var serverMsg = result.data && result.data.error;
            if (result.status >= 500) {
              showError('The server hit an error. Please try again in a moment.');
            } else {
              showError(serverMsg || 'Sign in failed. Please try again.');
            }
            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign in';
          })
          .catch(function () {
            // fetch only rejects on a genuine network/connection failure (server
            // restart, offline) — never on an HTTP error status.
            showError('Network error. Please try again.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign in';
          });
      });
    })();
  </script>
</body>
</html>
