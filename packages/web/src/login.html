<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1f" />
  <title>Sign in · SuperAgent</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='s' x1='0' y1='0' x2='0' y2='1'><stop offset='0' stop-color='%239ec7bd'/><stop offset='.48' stop-color='%23dce6cf'/><stop offset='1' stop-color='%23f3cda4'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23s)'/><circle cx='16' cy='12.5' r='4.4' fill='%23fff2d8'/><path d='M0 21 C8 17 13 20 18 18 C23 16 27 19 32 18 L32 32 L0 32 Z' fill='%2393b6ab'/><path d='M0 24 C7 21 12 24 17 22 C22 20 27 23 32 22 L32 32 L0 32 Z' fill='%235f8a7e'/><path d='M0 27 C6 25 11 27 16 26 C21 25 26 27 32 26 L32 32 L0 32 Z' fill='%232f5147'/></svg>" />
  <style>
    :root {
      --bg: #0a0f1f;
      --panel: rgba(12, 17, 28, 0.55);
      --border: rgba(255, 255, 255, 0.12);
      --text: #eef1f6;
      --muted: #9aa6b8;
      /* Warm "dawn" accent — calm sand, echoes the moon glow (replaces stark amber) */
      --accent: #d9a066;
      --accent-hover: #e7b27d;
      --accent-text: #1a1410;
      --danger: #f87171;
      --ok: #34d399;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; min-height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
    }
    body {
      display: flex; align-items: center; justify-content: center; padding: 24px;
      overflow: hidden;
    }

    /* ── Layered atmosphere (dusk) — fixed, behind the card ───────────────── */
    .atmosphere {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
      background:
        radial-gradient(120% 80% at 78% 12%, rgba(217, 160, 102, 0.10), transparent 55%),
        linear-gradient(180deg, #0a0f1f 0%, #102233 38%, #16323a 68%, #14302a 100%);
    }
    .moon {
      position: absolute; top: 12%; right: 16%;
      width: 132px; height: 132px; border-radius: 50%;
      background: radial-gradient(circle at 38% 36%, #fdf6e3 0%, #f3e7c9 46%, #e7d3a6 72%, #d9bf8e 100%);
      box-shadow: 0 0 70px 28px rgba(243, 231, 201, 0.18), inset -10px -12px 26px rgba(120, 96, 60, 0.25);
      animation: moonBreath 11s ease-in-out infinite;
    }
    .stars { position: absolute; inset: 0; opacity: 0.7; }
    .stars i {
      position: absolute; width: 2px; height: 2px; border-radius: 50%;
      background: #eef1f6; box-shadow: 0 0 6px rgba(238, 241, 246, 0.8);
      animation: twinkle 6s ease-in-out infinite;
    }
    .stars i:nth-child(1) { top: 14%; left: 18%; animation-delay: 0s; }
    .stars i:nth-child(2) { top: 22%; left: 42%; animation-delay: 1.4s; }
    .stars i:nth-child(3) { top: 9%;  left: 62%; animation-delay: 2.6s; }
    .stars i:nth-child(4) { top: 30%; left: 78%; animation-delay: 0.8s; }
    .stars i:nth-child(5) { top: 18%; left: 88%; animation-delay: 3.4s; }
    .stars i:nth-child(6) { top: 36%; left: 30%; animation-delay: 2.0s; }

    .hills { position: absolute; left: 0; right: 0; bottom: 0; width: 100%; height: 46%; display: block; }
    .hill-back  { fill: #1f4a47; opacity: 0.45; animation: driftA 120s ease-in-out infinite alternate; transform-origin: bottom; }
    .hill-mid   { fill: #1a3d38; opacity: 0.65; animation: driftB 150s ease-in-out infinite alternate; transform-origin: bottom; }
    .hill-front { fill: #143028; opacity: 0.96; animation: driftA 180s ease-in-out infinite alternate; transform-origin: bottom; }

    @keyframes moonBreath { 0%,100% { transform: scale(1); opacity: 0.92; } 50% { transform: scale(1.04); opacity: 1; } }
    @keyframes twinkle { 0%,100% { opacity: 0.25; } 50% { opacity: 0.8; } }
    @keyframes driftA { from { transform: translateX(0); } to { transform: translateX(-34px); } }
    @keyframes driftB { from { transform: translateX(0); } to { transform: translateX(26px); } }
    @media (prefers-reduced-motion: reduce) {
      .moon, .stars i, .hill-back, .hill-mid, .hill-front { animation: none; }
    }

    /* ── Card ─────────────────────────────────────────────────────────────── */
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
      background: var(--panel); border: 1px solid var(--border); border-radius: 20px;
      padding: 38px 32px; backdrop-filter: blur(18px) saturate(120%);
      -webkit-backdrop-filter: blur(18px) saturate(120%);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
      animation: rise 0.5s ease both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    .logo {
      width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
      background: transparent; margin-bottom: 20px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.22);
    }
    h1 { font-size: 23px; font-weight: 700; margin: 0 0 6px; letter-spacing: -0.02em; }
    p.sub { color: var(--muted); font-size: 13.5px; margin: 0 0 28px; line-height: 1.5; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin: 0 0 6px; }
    .field { margin-bottom: 16px; }
    input {
      width: 100%; padding: 12px 14px; background: rgba(0, 0, 0, 0.28);
      border: 1px solid var(--border); border-radius: 11px; color: var(--text); font-size: 14px;
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(217, 160, 102, 0.20); }
    button {
      width: 100%; padding: 12px; margin-top: 8px;
      background: linear-gradient(145deg, var(--accent) 0%, #c98e54 100%); color: var(--accent-text);
      border: 1px solid rgba(0, 0, 0, 0.15); border-radius: 11px; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: transform 0.1s, filter 0.15s;
    }
    button:hover { filter: brightness(1.05); }
    button:active { transform: scale(0.985); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { display: none; margin-bottom: 16px; padding: 10px 12px; border-radius: 11px; font-size: 13px; }
    .msg.show { display: block; animation: rise 0.2s ease both; }
    .msg.error { background: rgba(248, 113, 113, 0.12); border: 1px solid rgba(248, 113, 113, 0.3); color: var(--danger); }
    .hint { display: none; color: var(--muted); font-size: 11px; margin: -8px 0 16px; line-height: 1.5; }
    .hint.show { display: block; }
    .hint code, p.sub code { background: rgba(255,255,255,0.07); padding: 1px 5px; border-radius: 5px; font-size: 11px; }
    .foot { margin-top: 24px; text-align: center; color: var(--muted); font-size: 11px; letter-spacing: 0.01em; }
  </style>
</head>
<body>
  <div class="atmosphere" aria-hidden="true">
    <div class="moon"></div>
    <div class="stars"><i></i><i></i><i></i><i></i><i></i><i></i></div>
    <svg class="hills" viewBox="0 0 1440 320" preserveAspectRatio="none" aria-hidden="true">
      <path class="hill-back"  d="M0,196 C240,150 480,224 720,188 C960,152 1200,216 1440,176 L1440,320 L0,320 Z" />
      <path class="hill-mid"   d="M0,238 C200,202 400,266 720,230 C1000,198 1240,256 1440,228 L1440,320 L0,320 Z" />
      <path class="hill-front" d="M0,280 C260,252 520,300 760,276 C1020,250 1240,294 1440,272 L1440,320 L0,320 Z" />
    </svg>
  </div>

  <form class="card" id="auth-form" autocomplete="on">
    <!-- Single admin account: username is fixed. Included (hidden) so password
         managers and the browser's a11y heuristic associate the password field
         with a username instead of warning about a username-less form. -->
    <input type="text" id="username" name="username" value="admin" autocomplete="username" hidden />
    <div class="logo" role="img" aria-label="SuperAgent">
      <svg width="48" height="48" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="ls-sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#9ec7bd" />
            <stop offset="48%" stop-color="#dce6cf" />
            <stop offset="100%" stop-color="#f3cda4" />
          </linearGradient>
          <radialGradient id="ls-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fff4dd" stop-opacity="0.85" />
            <stop offset="100%" stop-color="#fff4dd" stop-opacity="0" />
          </radialGradient>
          <clipPath id="ls-clip"><rect x="2" y="2" width="28" height="28" rx="8" /></clipPath>
        </defs>
        <rect x="2" y="2" width="28" height="28" rx="8" fill="url(#ls-sky)" />
        <g clip-path="url(#ls-clip)">
          <circle cx="16" cy="12.5" r="8.5" fill="url(#ls-glow)" />
          <circle cx="16" cy="12.5" r="4.4" fill="#fff2d8" />
          <path d="M19.4 9.2 q1 -1 2 0 q1 -1 2 0" stroke="#fff" stroke-opacity="0.7" stroke-width="0.9" stroke-linecap="round" fill="none" />
          <path d="M23.6 11 q0.8 -0.8 1.6 0 q0.8 -0.8 1.6 0" stroke="#fff" stroke-opacity="0.55" stroke-width="0.8" stroke-linecap="round" fill="none" />
          <path d="M2 21 C8 17 13 20 18 18 C23 16 27 19 30 18 L30 30 L2 30 Z" fill="#93b6ab" />
          <path d="M2 24 C7 21 12 24 17 22 C22 20 27 23 30 22 L30 30 L2 30 Z" fill="#5f8a7e" />
          <path d="M2 27 C6 25 11 27 16 26 C21 25 26 27 30 26 L30 30 L2 30 Z" fill="#2f5147" />
        </g>
        <rect x="2" y="2" width="28" height="28" rx="8" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1" />
      </svg>
    </div>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to pick up where you left off.</p>

    <div class="msg error" id="error" role="alert" aria-live="assertive"></div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required autofocus aria-describedby="default-hint" />
    </div>
    <div class="hint" id="default-hint" role="status" aria-live="polite">
      No custom password set yet — the default password is <code>admin</code>.
      Set a new one via <code>superagent password set</code> or the Account page.
    </div>

    <button type="submit" id="submit">Sign in</button>
    <div class="foot">SuperAgent — your autonomous workspace</div>
  </form>

  <script>
    (function () {
      var form = document.getElementById('auth-form');
      var errorBox = document.getElementById('error');
      var submitBtn = document.getElementById('submit');
      var defaultHint = document.getElementById('default-hint');
      var passwordInput = document.getElementById('password');

      function showError(msg) {
        errorBox.textContent = msg;
        errorBox.classList.add('show');
      }

      // Skip to the app if already signed in; otherwise show the default-password
      // hint when no custom password has been configured yet.
      fetch('/api/auth/status', { credentials: 'same-origin' })
        .then(function (r) { return r.json(); })
        .then(function (s) {
          if (!s) return;
          if (s.authenticated) { window.location.replace('/'); return; }
          if (s.authRequired && !s.passwordSet) defaultHint.classList.add('show');
        })
        .catch(function () {});

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        errorBox.classList.remove('show');

        var password = passwordInput.value;
        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in…';

        fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ password: password })
        })
          .then(function (res) {
            // Read the body as text first so a non-JSON error response (e.g. the
            // server's default 500 HTML page) can't throw while parsing JSON and
            // get misreported as a network failure in the catch below.
            return res.text().then(function (text) {
              var data = null;
              try { data = text ? JSON.parse(text) : null; } catch (e) { data = null; }
              return { ok: res.ok, status: res.status, data: data };
            });
          })
          .then(function (result) {
            if (result.ok) {
              window.location.replace('/');
              return;
            }
            // The server answered, so this is NOT a network error. Distinguish a
            // server-side fault (5xx) from a normal auth failure (e.g. 401).
            var serverMsg = result.data && result.data.error;
            if (result.status >= 500) {
              showError('The server hit an error. Please try again in a moment.');
            } else {
              showError(serverMsg || 'Sign in failed. Please try again.');
            }
            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign in';
          })
          .catch(function () {
            // fetch only rejects on a genuine network/connection failure (server
            // restart, offline) — never on an HTTP error status.
            showError('Network error. Please try again.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign in';
          });
      });
    })();
  </script>
</body>
</html>
