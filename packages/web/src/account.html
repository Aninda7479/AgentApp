<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0c10" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='32' y2='32'><stop stop-color='%238b5cf6'/><stop offset='1' stop-color='%2338bdf8'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><path d='M11 22L16 10l5 12' stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' fill='none'/><circle cx='16' cy='22.5' r='1.8' fill='white'/><circle cx='21' cy='10' r='1.8' fill='white'/></svg>" />
  <title>Account · SuperAgent</title>
  <style>
    :root {
      --bg: #0b0c10;
      --panel: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.1);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #7c3aed;
      --accent2: #4f46e5;
      --danger: #f87171;
      --ok: #34d399;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; min-height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
    }
    body {
      display: flex; align-items: center; justify-content: center; padding: 24px;
      background:
        radial-gradient(circle at 20% 20%, rgba(124, 58, 237, 0.14), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(56, 189, 248, 0.10), transparent 40%),
        var(--bg);
    }
    .card {
      width: 100%; max-width: 420px;
      background: var(--panel); border: 1px solid var(--border); border-radius: 18px;
      padding: 32px 30px; backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }
    .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    h1 { font-size: 20px; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
    .who { color: var(--muted); font-size: 12px; margin-top: 3px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin: 0 0 6px; }
    .field { margin-bottom: 16px; }
    input {
      width: 100%; padding: 11px 13px; background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px;
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.18); }
    button {
      width: 100%; padding: 12px; margin-top: 6px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: transform 0.1s, filter 0.15s;
      background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
    }
    button:hover { filter: brightness(1.08); }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .linkbtn {
      background: none; color: var(--muted); font-size: 12px; width: auto; padding: 6px 10px;
      border: 1px solid var(--border); border-radius: 8px; margin: 0;
    }
    .linkbtn:hover { color: var(--text); filter: none; }
    .msg { display: none; margin-bottom: 16px; padding: 10px 12px; border-radius: 10px; font-size: 13px; }
    .msg.show { display: block; }
    .msg.error { background: rgba(248, 113, 113, 0.12); border: 1px solid rgba(248, 113, 113, 0.3); color: var(--danger); }
    .msg.ok { background: rgba(52, 211, 153, 0.12); border: 1px solid rgba(52, 211, 153, 0.3); color: var(--ok); }
    .row { display: flex; gap: 10px; margin-top: 8px; }
    .row button { margin-top: 0; }
    hr { border: none; border-top: 1px solid var(--border); margin: 4px 0 20px; }
  </style>
</head>
<body>
  <form class="card" id="account-form">
    <div class="top">
      <div>
        <h1>Account settings</h1>
        <div class="who" id="who">Signed in</div>
      </div>
      <button type="button" class="linkbtn" id="back">← Back to app</button>
    </div>
    <hr />

    <div class="msg error" id="error"></div>
    <div class="msg ok" id="success"></div>

    <div class="field">
      <label for="currentPassword">Current password</label>
      <input id="currentPassword" name="currentPassword" type="password" autocomplete="current-password" required />
    </div>
    <div class="field">
      <label for="newPassword">New password</label>
      <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" required />
    </div>
    <div class="field">
      <label for="confirm">Confirm new password</label>
      <input id="confirm" name="confirm" type="password" autocomplete="new-password" required />
    </div>

    <button type="submit" id="submit">Update password</button>
    <div class="row">
      <button type="button" class="linkbtn" id="logout" style="flex:1;">Log out</button>
    </div>
  </form>

  <script>
    (function () {
      var form = document.getElementById('account-form');
      var errorBox = document.getElementById('error');
      var okBox = document.getElementById('success');
      var submitBtn = document.getElementById('submit');

      function show(box, msg) {
        errorBox.classList.remove('show');
        okBox.classList.remove('show');
        box.textContent = msg;
        box.classList.add('show');
      }

      // Confirm we are authenticated (the login is password-only, so there is
      // no username to display — just that the session is valid).
      fetch('/api/auth/status', { credentials: 'same-origin' })
        .then(function (r) { return r.json(); })
        .then(function (s) {
          if (!s || (s.authRequired && !s.authenticated)) { window.location.replace('/login'); return; }
          if (!s.authRequired) {
            show(errorBox, 'Authentication is disabled on this server.');
            submitBtn.disabled = true;
          }
        })
        .catch(function () {});

      document.getElementById('back').addEventListener('click', function () {
        window.location.replace('/');
      });

      document.getElementById('logout').addEventListener('click', function () {
        fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' })
          .then(function () { window.location.replace('/login'); })
          .catch(function () { window.location.replace('/login'); });
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var newPassword = document.getElementById('newPassword').value;
        var confirm = document.getElementById('confirm').value;
        if (newPassword !== confirm) { show(errorBox, 'New passwords do not match.'); return; }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Updating…';

        fetch('/api/auth/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({
            currentPassword: document.getElementById('currentPassword').value,
            newPassword: newPassword
          })
        })
          .then(function (res) { return res.json().then(function (d) { return { ok: res.ok, data: d }; }); })
          .then(function (result) {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Update password';
             if (result.ok) {
               show(okBox, 'Password updated successfully.');
               form.reset();
             } else {
              show(errorBox, (result.data && result.data.error) || 'Update failed.');
            }
          })
          .catch(function () {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Update password';
            show(errorBox, 'Network error. Please try again.');
          });
      });
    })();
  </script>
</body>
</html>
