<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperAgent</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23a16207'/><path d='M11 22L16 10l5 12' stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' fill='none'/><circle cx='16' cy='22.5' r='1.8' fill='white'/><circle cx='21' cy='10' r='1.8' fill='white'/></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08090d">
  <meta name="description" content="SuperAgent — autonomous AI agent for coding, browser automation, and multimodal media generation.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/index.css">
  <style>
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      height: 100vh;
      height: 100dvh;
      width: 100%;
      max-width: 100vw;
      overflow: hidden;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
      margin: 0;
      padding: 0;
    }
    #root {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
    }
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.16);
    }
  </style>
</head>
<body class="bg-[#0b0c10] text-gray-200">
  <div id="root"></div>
  <!-- Load the IPC mock bridge first -->
  <script src="/ipc-bridge.js"></script>
  <!-- Load the main bundled React application -->
  <script src="/client.js"></script>
</body>
</html>
