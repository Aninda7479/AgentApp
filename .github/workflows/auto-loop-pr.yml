name: Auto-Loop PR — Build & Test

on:
  push:
    branches:
      - 'auto/**'
  pull_request:
    branches:
      - agent-development
    types: [opened, synchronize, reopened]

jobs:
  verify:
    name: Build & Test (Auto-Loop Verification)
    runs-on: ubuntu-latest

    # Only run this workflow for auto/* branches or PRs from auto/* branches
    if: |
      startsWith(github.ref, 'refs/heads/auto/') ||
      startsWith(github.head_ref, 'auto/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all workspaces
        id: build
        run: npm run build
        continue-on-error: true

      - name: Run test suite
        id: test
        run: npm test
        continue-on-error: true

      - name: Extract skill name from branch
        id: branch_info
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          SKILL=$(echo "$BRANCH" | sed 's|auto/[0-9-]*-\([^/]*\).*|\1|')
          echo "skill=$SKILL" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Post PR comment with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const build = '${{ steps.build.outcome }}';
            const test  = '${{ steps.test.outcome }}';
            const skill = '${{ steps.branch_info.outputs.skill }}';
            const branch = '${{ steps.branch_info.outputs.branch }}';

            const buildIcon = build === 'success' ? '✅' : '❌';
            const testIcon  = test  === 'success' ? '✅' : (test === 'skipped' ? '⏭️' : '❌');
            const overall   = (build === 'success' && (test === 'success' || test === 'skipped'))
              ? '🟢 READY TO MERGE'
              : '🔴 NEEDS ATTENTION';

            const body = `## 🤖 Auto-Loop CI Results

            **Skill**: \`${skill}\`
            **Branch**: \`${branch}\`

            | Check | Result |
            |-------|--------|
            | Build | ${buildIcon} ${build} |
            | Tests | ${testIcon} ${test} |

            **${overall}**

            ${build !== 'success' ? '> ❌ Build failed — the auto-loop committed code that does not compile. Check the [Actions log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.' : ''}
            ${test !== 'success' && test !== 'skipped' ? '> ❌ Tests failed — some existing tests broke. Review before merging.' : ''}
            ${overall.includes('READY') ? '> Review the diff below, check research sources in the skill log, confirm no secrets, then merge when satisfied.' : ''}

            ---
            *Auto-generated by [auto-loop-pr.yml](../../blob/main/.github/workflows/auto-loop-pr.yml)*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Label PR as auto-generated
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            // Create label if it doesn't exist
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'auto-generated',
                color: '0075ca',
                description: 'Created by the autonomous self-improvement loop'
              });
            } catch (e) {
              // Label already exists — that's fine
            }
            // Apply label to PR
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['auto-generated']
            });

      - name: Fail if build or tests failed
        if: steps.build.outcome == 'failure' || steps.test.outcome == 'failure'
        run: |
          echo "Build or test failures detected in auto-loop commit."
          echo "Build: ${{ steps.build.outcome }}"
          echo "Test:  ${{ steps.test.outcome }}"
          exit 1
