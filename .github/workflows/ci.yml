name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # Build core → cli → desktop → web (mirrors root `npm run build`).
      - run: npm run build

      - name: Build promotion site
        working-directory: website
        run: |
          npm ci
          npm run build
        env:
          BASE_PATH: '/AgentApp/'
